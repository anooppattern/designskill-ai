services:
  - type: web
    name: designskill-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: designskill-db
          property: connectionString
      - key: NEXTAUTH_URL
        value: https://designskill.co
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: CHROMIUM_EXECUTABLE_PATH
        value: /usr/bin/chromium

databases:
  - name: designskill-db
    plan: starter
    databaseName: designskill
    user: designskill_user
